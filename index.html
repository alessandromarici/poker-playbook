<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Poker Playbook 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0f;
  --s1: #111418;
  --s2: #191d24;
  --s3: #212730;
  --border: #252d38;
  --border2: #2e3948;
  --blue: #4da6ff;
  --blue-d: rgba(77,166,255,0.12);
  --orange: #ff7a45;
  --orange-d: rgba(255,122,69,0.12);
  --gold: #ffc94d;
  --gold-d: rgba(255,201,77,0.12);
  --green: #3ddc84;
  --green-d: rgba(61,220,132,0.12);
  --red: #ff5c5c;
  --red-d: rgba(255,92,92,0.12);
  --text: #dde3ed;
  --muted: #5a6880;
  --muted2: #7a8a9a;
  --r: 10px;
  --nav-w: 230px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.6}
a{text-decoration:none;color:inherit}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--nav-w);background:var(--s1);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.main{margin-left:var(--nav-w);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* BRAND */
.brand{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.brand-logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase}
.brand-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}

/* NAV */
.nav{padding:12px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--muted2);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--blue-d);border-color:rgba(77,166,255,.2);color:var(--blue)}
.nav-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}

/* TOPBAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.tag{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;border-radius:999px;border:1px solid;letter-spacing:.05em}
.tag-blue{background:var(--blue-d);border-color:rgba(77,166,255,.3);color:var(--blue)}
.tag-orange{background:var(--orange-d);border-color:rgba(255,122,69,.3);color:var(--orange)}
.tag-gold{background:var(--gold-d);border-color:rgba(255,201,77,.3);color:var(--gold)}

/* CONTENT */
.content{padding:20px 24px;max-width:900px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-head-icon{font-size:14px}
.card-head-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue)}
.card-body{padding:16px 18px}

/* SECTION TITLE inside card */
.section{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.section::after{content:'';flex:1;height:1px;background:var(--border)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* BULLET LIST */
.blist{display:flex;flex-direction:column;gap:6px}
.bitem{display:flex;align-items:flex-start;gap:9px;font-size:13px;line-height:1.5}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dot-blue{background:var(--blue)}
.dot-orange{background:var(--orange)}
.dot-gold{background:var(--gold)}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-muted{background:var(--muted)}

/* HIGHLIGHT RULES */
.rules{display:flex;flex-direction:column;gap:5px}
.rule{padding:8px 12px;border-radius:7px;font-size:12.5px;line-height:1.45;border-left:3px solid var(--blue);background:var(--s2)}
.rule-orange{border-left-color:var(--orange)}
.rule-gold{border-left-color:var(--gold)}
.rule-green{border-left-color:var(--green)}
.rule-red{border-left-color:var(--red)}
.rule-muted{border-left-color:var(--muted)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--s2);color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid rgba(37,45,56,.7);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--gold);font-size:12px}

/* BOARD GRID */
.board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.bc{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:13px}
.bc-title{font-size:11.5px;font-weight:700;color:var(--orange);margin-bottom:4px}
.bc-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px}
.bc ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.bc li{font-size:12px;line-height:1.4;color:var(--text);display:flex;gap:6px}
.bc li::before{content:'›';color:var(--blue);font-weight:700;flex-shrink:0}

/* BADGE */
.badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:3px}
.badge-ip{background:var(--green-d);color:var(--green);border:1px solid rgba(61,220,132,.25)}
.badge-oop{background:var(--red-d);color:var(--red);border:1px solid rgba(255,92,92,.25)}
.badge-gold{background:var(--gold-d);color:var(--gold);border:1px solid rgba(255,201,77,.25)}

/* MOBILE */
.mob-header{display:none;background:var(--s1);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
.mob-header-title{font-size:14px;font-weight:700;color:var(--blue)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);z-index:200;padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom));overflow-x:auto;scrollbar-width:none}
.mob-nav::-webkit-scrollbar{display:none}
.mob-nav-inner{display:flex;gap:2px;min-width:max-content;padding:0 4px}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 11px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.mob-btn .mi{font-size:15px}
.mob-btn.active{background:var(--blue-d);color:var(--blue)}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .topbar{display:none}
  .mob-nav{display:flex}
  .mob-header{display:block}
  .content{padding:14px;padding-bottom:85px}
  .two-col{grid-template-columns:1fr}
  .board-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .board-grid{grid-template-columns:1fr}
}
</style>
</head>

multy:{title:"Multiway",tag:"GENERALE",tagClass:"tag-blue",html:`
<div class="card">
  <div class="card-head"><span class="card-head-icon">👥</span><span class="card-head-title">Principi Base</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-green"></div><span><strong>Bet:</strong>Small solo con nuts / quasi nuts, o per negare equity a draw forti su board wet.</span></div>
      <div class="bitem"><div class="dot dot-blue"></div><span><strong>Check OOP:</strong> mani medie e air → fold equity quasi nulla.</span></div>
      <div class="bitem"><div class="dot dot-muted"></div><span><strong>Bluff:</strong> quasi zero. Più Squeeze/Iso piuttosto</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span><strong>Semi-bluff:</strong> solo draw forti (OESD, NFD).</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span><strong>Value:</strong> range molto più stretto rispetto a HU. TP marginale → check in multiway.</span></div>
    </div>
    <div class="section">Per Numero di Giocatori</div>
    <div class="two-col">
      <div>
        <div class="section">3-Way</div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-orange"></div><span>Frequenza bet ↓ su board wet</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Value minimo: TP forte / overpair su dry</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Board wet → overpair marginali = check</span></div>
        </div>
      </div>
      <div>
        <div class="section">4+ Way</div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-red"></div><span>Modalità <strong>fit-or-fold</strong></span></div>
          <div class="bitem"><div class="dot dot-muted"></div><span>Bet quasi zero</span></div>
          <div class="bitem"><div class="dot dot-green"></div><span>Value: solo nuts (set, scala, flush)</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🃏</span><span class="card-head-title">Strategia per Board</span></div>
  <div class="card-body">
    <div class="board-grid">
      <div class="bc"><div class="bc-title">Dry (Axx, Kxx)</div><div class="bc-sub">Size: 25–33%</div><ul><li>Bet: TP forte (AK, AQ)</li><li>Check: mani medie per indurre bluff</li></ul></div>
      <div class="bc"><div class="bc-title">Low (742, 852)</div><div class="bc-sub">Size: 33–50%</div><ul><li>Bet: set / overpair vulnerabili TT-QQ</li><li>Check: mani marginali</li></ul></div>
      <div class="bc"><div class="bc-title">Paired</div><div class="bc-sub">Size: small</div><ul><li>Check alta frequenza</li><li>Evita barrel senza trips+</li></ul></div>
      <div class="bc"><div class="bc-title">Coordinati (JT9, 987)</div><div class="bc-sub">Size: 66–80%</div><ul><li>Polarizzazione estrema</li><li>Bet: scale, set</li><li>Check: TP e mani medie</li></ul></div>
      <div class="bc"><div class="bc-title">Monotone</div><div class="bc-sub">Size: &lt;50%</div><ul><li>Bet: nut FD / flush</li><li>Check: tutto il resto</li></ul></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">📍</span><span class="card-head-title">Posizione</span></div>
  <div class="card-body">
    <div class="two-col">
      <div>
        <div class="section"><span class="badge badge-ip">IP</span></div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-green"></div><span>Controllo pot e realizzazione equity</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Bet solo dopo check multipli + nut advantage</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Check-back: sempre con mani medie</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Bluff river: solo se mostrano debolezza</span></div>
        </div>
      </div>
      <div>
        <div class="section"><span class="badge badge-oop">OOP</span></div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-orange"></div><span>Strategia base: check range</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Check-call: solo con equity forte</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Check-raise: rarissimo → set+</span></div>
        </div>
      </div>
    </div>
    <div class="section">Turn & River</div>
    <div class="two-col">
      <div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-blue"></div><span><strong>Turn:</strong> le mani valgono meno rispetto a HU. Bet solo su blank o con nut advantage.</span></div>
          <div class="bitem"><div class="dot dot-orange"></div><span>Draw completato → rallenta anche con Two Pair</span></div>
        </div>
      </div>
      <div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-orange"></div><span><strong>River:</strong> bet value serve mano quasi-nut</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Vs Check-Raise: forza enorme → fold tutto tranne nuts</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">⚡</span><span class="card-head-title">Regole Rapide</span></div>
  <div class="card-body">
    <div class="rules">
      <div class="rule">Multiway + board monotone → check range</div>
      <div class="rule rule-orange">TP marginale vs 3+ giocatori → mai bet</div>
      <div class="rule rule-gold">Fish al tavolo → value only</div>
      <div class="rule rule-green">Board wet + nuts → bet grande immediato</div>
      <div class="rule rule-muted">BB multiway → difendi più tight (fold JTo, 87s vs open HJ con call SB)</div>
    </div>
  </div>
</div>
`},

"srp-oop-raiser":{title:"SRP OOP Raiser (SB)",tag:"SRP",tagClass:"tag-orange",html:`
<div class="card">
  <div class="card-head"><span class="card-head-icon">🎯</span><span class="card-head-title">Principi Flop</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span><strong>Bet default 33%</strong> specie su board che avvantaggiano OR, con value Cat 1 e draw Cat 3.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Bilancia inserendo alcune mani Cat 1 nel check per non essere prevedibile (doppia, set, scala).</span></div>
      <div class="bitem"><div class="dot dot-muted"></div><span>Air e mani medie senza backdoor → check.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Board coordinati: tendenzialmente xraisati da oppo. Bet con valore da proteggere (QQ, TT). Trapola il value strong (KK+).</span></div>
      <div class="bitem"><div class="dot dot-blue"></div><span>Evita di ingrossare il pot OOP se non sei strong. Se oppo xr: call TP e draw veramente forti.</span></div>
    </div>
    <div class="section">Frequenze C-bet</div>
    <table>
      <thead><tr><th>Size</th><th>Quando</th></tr></thead>
      <tbody>
        <tr><td class="mono">33%</td><td>Default. Board dry/statici, board high con range advantage.</td></tr>
        <tr><td class="mono">66–75%</td><td>Board wet/coordinati, strategia polarizzata (usare poco).</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🃏</span><span class="card-head-title">Strategia per Board</span></div>
  <div class="card-body">
    <div class="board-grid">
      <div class="bc"><div class="bc-title">C-bet 25%</div><ul><li>High (Kxx, Qxx); DRY favorevoli</li><li>Su Ahigh: cbet molto meno</li></ul></div>
      <div class="bc"><div class="bc-title">Check always e controllo</div><ul><li>Low (8-high o meno)</li><li>A mono; Paired bassi; board sfavorevoli</ul></div>      
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🔄</span><span class="card-head-title">Turn</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>Block bet su board scary/wet per prendere info.</span></div>
      <div class="bitem"><div class="dot dot-green"></div><span>Bet value forte Cat 1, draw e value medio max 2nd pair con equity al turn.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Overbet se hai netto vantaggio di range, nut FD o combo draw.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Bluff dopo check: anche 75% per giocare la fold equity, oppure solito 33%. No value showdown, no block bluff di oppo.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🏁</span><span class="card-head-title">River</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-green"></div><span>Value bet se oppo cappato.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Overbet vs debolezza mostrata al turn, anche con 2nd pair.</span></div>
      <div class="bitem"><div class="dot dot-blue"></div><span>Bluff catch: solo TP+.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Bet tre strade OPPO di solito = troppa forza, specie se XR.</span></div>
      <div class="bitem"><div class="dot dot-muted"></div><span>FD mancati: pessimi candidati per bluff tre strade OOP.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">⚡</span><span class="card-head-title">Regole Rapide</span></div>
  <div class="card-body">
    <div class="rules">
      <div class="rule">Over-cbet su board BB-favored → errore comune</div>
      <div class="rule rule-orange">Bluff con FD → blocchi fold oppo. Evita.</div>
      <div class="rule rule-gold">Bluff senza piano per il turn → evita</div>
      <div class="rule rule-muted">Non togliere value forte dal range check flop, serve per bilanciare (trap)</div>
    </div>
  </div>
</div>
`},

"srp-oop-caller":{title:"SRP OOP Caller (BB)",tag:"SRP",tagClass:"tag-orange",html:`
<div class="card">
  <div class="card-head"><span class="card-head-icon">🎯</span><span class="card-head-title">Principi Base</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>Gioca aggressivo specie vs bet piccolo: tanto XR, frequenza 17–18%.</span></div>
      <div class="bitem"><div class="dot dot-green"></div><span>XR con value forte Cat 1 e draw Cat 3.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Mani da XR: BDFD/BDST + TPTK alto/basso, OC K/Q con BDFD/BDST, Bottom/Pocket con BDFD + BDSD, doppia+.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Sempre attenzione al board: in generale più equity = più aggressività, specie su board favorevoli.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Donk bet: TURN o RIVER su board favorevoli.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">📞</span><span class="card-head-title">Call al Flop</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>Call con value medio + draw BD possibilmente. Se non migliorano al turn → fold subito o cerca di arrivare gratis al river.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🃏</span><span class="card-head-title">Strategia per Board</span></div>
  <div class="card-body">
    <div class="board-grid">
      <div class="bc"><div class="bc-title">Sfavorevoli (2BRW)</div><ul><li>Call: TP medio/MP + BDFD / OC+BD</li><li>XR: Value forte; draw tanta equity</li></ul></div>
      <div class="bc"><div class="bc-title">Favorevoli (Piared bassi/Low)</div><ul><li>Call: Value SD; draw medio</li><li>XR: Set; coppie vulnerabili; combo draw</ul></div>
        <div class="bc"><div class="bc-title">Mono/coordinati</div><ul><li>Call: Value SD; draw medio</li><li>XR mono: Draw bassi; XR coor: Draw/combo draw h/l; TWOPAIR+</ul></div>       
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🔄</span><span class="card-head-title">Turn</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>Se hai XR: continua su molte draw, prepara il terreno con la size giusta se decidi di andare all-in.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Block bet per info: specie su turn che chiudono draw.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Su A/K al turn: tanto check.</span></div>
      <div class="bitem"><div class="dot dot-red"></div><span>Se oppo re-raise: all-in solo con nuts assoluti e combo draw mostruosi, altrimenti fold.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🏁</span><span class="card-head-title">River</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>Hai già preparato la giocata al turn.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Bluff tre strade: FD mancati pessimi candidati (non bloccano fold oppo).</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Il bluff non deve bloccare i fold di oppo.</span></div>
      <div class="bitem"><div class="dot dot-muted"></div><span>In call: occhio che nessuno betta tre strade senza valore, specie su board high al nostro livello.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">⚡</span><span class="card-head-title">Linee Exploit</span></div>
  <div class="card-body">
    <div class="rules">
      <div class="rule rule-green">Vs REG: vs size piccole → aumenta frequenza XR. MDF non è vincolante.</div>
      <div class="rule rule-orange">Combo XR: BDFD/BDST + TP forte/basso + K/Q BDFL/ST + Bottom/2nd Pair BDFS/ST su DRY + UP BDFD + OC BDFS/ST.</div>
      <div class="rule">Vs Calling Station: bluffa meno, value thin.</div>
      <div class="rule rule-gold">Vs Nit: fold anche TP deboli.</div>
      <div class="rule rule-red">Vs Maniac: check-call con 2pair+ → lasciali bluffare.</div>
    </div>
  </div>
</div>
`},

"srp-ip-raiser":{title:"SRP IP Raiser (BTN)",tag:"SRP",tagClass:"tag-orange",html:`
<div class="card">
  <div class="card-head"><span class="card-head-icon">🎯</span><span class="card-head-title">Principi Flop</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>C-bet molto frequente specie su board nostro. Attenzione ai board low e coordinati, adatti a XR per oppo.</span></div>
      <div class="bitem"><div class="dot dot-green"></div><span>Value forte e draw: bettano flop e turn (75% o OB con netto vantaggio).</span></div>
      <div class="bitem"><div class="dot dot-muted"></div><span>Value medio-basso senza BD: check, così come air.</span></div>   
    </div>
    <div class="section">Vs XR</div>
    <div class="blist">
      <div class="bitem"><div class="dot dot-blue"></div><span>Call: bottom pair BDFD e draw importanti. Fold il resto.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Vs Fish: fast play e bet grandi con value se calling station. Pochi bluff.</span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🃏</span><span class="card-head-title">Strategia per Board</span></div>
  <div class="card-body">
    <div class="board-grid">
      <div class="bc"><div class="bc-title">Favorevoli</div><div class="bc-sub">Size: 25–33% · Freq: 100%</div><ul><li>Always</li><li>Check: aria vs fish</li></ul></div>
      <div class="bc"><div class="bc-title">Sfavorevoli</div><ul><li>Check molto → BB advantage</li><li>low <8 no mono; pairati bassi; A Wheel</li></ul></div>      
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🔄</span><span class="card-head-title">Turn & River</span></div>
  <div class="card-body">
    <div class="two-col">
      <div>
        <div class="section">Turn</div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-gold"></div><span>Barrel 2nd Pair+ su blank o scare card (A/K) → size 66–75%.</span></div>
          <div class="bitem"><div class="dot dot-green"></div><span>Overbet quando hai nut advantage o range villain è capped.</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Delayed cbet 75% dopo check flop: usa draw, backdoor o air senza showdown value.</span></div>
        </div>
      </div>
      <div>
        <div class="section">River</div>
        <div class="blist">
          <div class="bitem"><div class="dot dot-orange"></div><span>Bluff: non bloccare i draw mancati di villain.</span></div>
          <div class="bitem"><div class="dot dot-blue"></div><span>Bluff catch: TP+ (2nd pair su overcard al river).</span></div>
          <div class="bitem"><div class="dot dot-muted"></div><span>No bluff con FD mancati.</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">⚡</span><span class="card-head-title">Regole Rapide</span></div>
  <div class="card-body">
    <div class="rules">
      <div class="rule">Over-cbet su board favorevoli al BB → errore comune</div>
      <div class="rule rule-orange">Bluff senza equity → evita sempre</div>
      <div class="rule">Non bluffare quando villain ha già investito molto</div>
      <div class="rule rule-gold">Size eccessiva senza motivazione chiara → evita</div>
    </div>
  </div>
</div>
`},

"3b-oop-raiser":{title:"3Bet OOP Raiser (SB)",tag:"3BET",tagClass:"tag-gold",html:`
<div class="card">
  <div class="card-head"><span class="card-head-icon">🎯</span><span class="card-head-title">Principi Base</span></div>

<div class="card">

    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><span class="card-head-icon">🏁</span><span class="card-head-title">River</span></div>

      <div class="bitem"><div class="dot dot-gold"></div><span>Block bet con value medio 40–50% su debolezza oppo che pensi di battere.</span></div>
      <div class="bitem"><div class="dot dot-blue"></div><span>Hai già preparato al turn cosa fare.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Evita bluff con FD mancati.</span></div>
      <div class="bitem"><div class="dot dot-blue"></div><span>Bluff catch: TP+.</span></div>
    </div>
  </div>
</div>
`},

"3b-oop-caller":{title:"3Bet OOP Caller (BB)",tag:"3BET",tagClass:"tag-gold",html:`
<div class="card">
  <div class="card-head"><span class="card-head-icon">🎯</span><span class="card-head-title">Principi Base</span></div>
  <div class="card-body">
    <div class="blist">
      <div class="bitem"><div class="dot dot-red"></div><span>Svantaggio strutturale: range più debole + fuori posizione.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>SPR basso: TPTK spesso stack-off.</span></div>
      <div class="bitem"><div class="dot dot-blue"></div><span>Simile a IP caller ma più fold da OOP.</span></div>
      <div class="bitem"><div class="dot dot-orange"></div><span>Aggressivo con draw bila, FD alti e bassi, pocket BD ST, TP forti.</span></div>
      <div class="bitem"><div class="dot dot-gold"></div><span>Proteggi il check con value forte per bilanciare. Valuta sempre il board e chi favorisce.</span></div>
      <div class="bitem"><div class="dot dot-red"></div><span>Errore comune: call troppo larghi o zero XR su board bassi.</span></div>
    </div>
  </div>
</div>

<div class="card">

function render(key){
  const s=S[key];
  if(!s)return;
  document.getElementById('content').innerHTML=s.html;
  document.getElementById('pg-title').textContent=s.title;
  document.getElementById('mob-title').textContent='♠ '+s.title;
  const tag=document.getElementById('pg-tag');
  tag.textContent=s.tag;
  tag.className='tag '+s.tagClass;
  document.querySelectorAll('#snav .nav-item').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  document.querySelectorAll('#mnav .mob-btn').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('snav').addEventListener('click',e=>{
  const el=e.target.closest('[data-key]');
  if(el)render(el.dataset.key);
});
document.getElementById('mnav').addEventListener('click',e=>{
  const el=e.target.closest('[data-key]');
  if(el)render(el.dataset.key);
});

render('regole');
</script>
